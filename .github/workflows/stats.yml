name: Update stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/stats.yml"

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        run: |
          curl -sL "https://github-readme-stats.vercel.app/api?username=sakethbalijepalli&show_icons=true&theme=transparent" -o stats.svg
          curl -sL "https://streak-stats.demolab.com/?user=sakethbalijepalli&theme=transparent" -o streak.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg streak.svg
          git diff --staged --quiet || git commit -m "Update stats"
          git push
